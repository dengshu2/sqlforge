services:
  sqlforge:
    build:
      context: .
      args:
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID}
    container_name: sqlforge
    restart: unless-stopped
    ports:
      - "127.0.0.1:7082:8080"
    environment:
      - PORT=8080
      - STATIC_DIR=/app/static
      - CORS_ORIGINS=https://sqlforge.dengshu.ovh
      - TZ=Asia/Shanghai
    networks:
      - npm-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  npm-network:
    external: true
